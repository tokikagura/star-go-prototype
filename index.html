<!DOCTYPE html>
<!--
  星囲碁 / Hoshigo Prototype v1.0i
  Concept & Design: 刻神楽 (_tokikagura)
  Implementation support: AI-assisted prototyping
  License: Prototype / private experimental build
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星囲碁 プロトタイプ v1.0i</title>
  <style>
/* ════════════════════════════════
   リセット・基礎
════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', monospace;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 10px;
  padding-bottom: 120px;
  overflow-y: auto;
}

/* ════════════════════════════════
   レイアウト: メイン列
════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  max-width: 520px;
  margin: 0 auto;
  width: 100%;
}

/* ════════════════════════════════
   タイトル
════════════════════════════════ */
#title-bar {
  font-size: 1.1rem;
  color: #ffd700;
  letter-spacing: 2px;
  text-align: center;
  padding: 2px 0;
}

/* ════════════════════════════════
   ステータスバー
════════════════════════════════ */
#status-bar {
  width: 100%;
  font-size: 0.95rem;
  padding: 8px 14px;
  background: #0f3460;
  border-radius: 6px;
  min-height: 2.2em;
  text-align: center;
}
#status-bar span { font-weight: bold; color: #ffd700; }

/* ════════════════════════════════
   盤面
════════════════════════════════ */
#board-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
}
#board-canvas {
  display: block;
  width: min(94vw, 520px);
  height: auto;
  cursor: crosshair;
  border: 2px solid #555;
  border-radius: 4px;
  touch-action: none;
}

/* ════════════════════════════════
   星石パネル（常時表示）
════════════════════════════════ */
#star-panel {
  width: 100%;
  background: #16213e;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 10px 14px;
}
.star-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.star-badge {
  font-size: 1.4rem;
  cursor: pointer;
  user-select: none;
  transition: opacity 0.2s, text-shadow 0.2s;
  line-height: 1;
}
.star-badge.used   { opacity: 0.25; cursor: default; }
.star-badge.active { text-shadow: 0 0 10px gold; }
.star-label        { font-size: 0.8rem; color: #bbb; }

/* ════════════════════════════════
   主要ボタン行（常時表示）
════════════════════════════════ */
#main-btns {
  width: 100%;
  display: flex;
  gap: 8px;
}
#main-btns button { flex: 1; }

/* ════════════════════════════════
   ボタン共通スタイル
════════════════════════════════ */
button.action {
  padding: 9px 10px;
  border: 1px solid #555;
  border-radius: 5px;
  background: #2a2a4a;
  color: #e0e0e0;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  transition: background 0.15s;
  white-space: nowrap;
}
button.action:hover  { background: #3a3a6a; }
button.action:active { background: #4a4a8a; }
button.action.primary { background: #0f3460; border-color: #4a7abc; color: #fff; }
button.action.danger  { background: #5a1a1a; border-color: #aa4444; color: #fff; }

/* ════════════════════════════════
   折りたたみ「詳細」セクション
════════════════════════════════ */
#detail-section {
  width: 100%;
}

#btn-detail-toggle {
  width: 100%;
  padding: 9px;
  background: #1e2a4a;
  border: 1px solid #3a4a6a;
  border-radius: 6px;
  color: #aac4ff;
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.15s;
}
#btn-detail-toggle:hover { background: #263562; }
#detail-arrow { transition: transform 0.25s; display: inline-block; }
#detail-arrow.open { transform: rotate(180deg); }

#detail-content {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
  overflow-y: auto;
}
#detail-content.open { display: flex; }

/* ────── 詳細内のカード ────── */
.card {
  background: #16213e;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 12px 14px;
}
.card h2 {
  font-size: 0.8rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

/* ────── 統計グリッド ────── */
#stats-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 16px;
  font-size: 0.82rem;
}
#stats-grid .key { color: #888; white-space: nowrap; }
#stats-grid .val { color: #ffd700; }

/* ────── 棋譜ログ ────── */
#move-log {
  font-size: 0.78rem;
  max-height: 240px;
  overflow-y: auto;
  line-height: 1.7;
  color: #bbb;
  -webkit-overflow-scrolling: touch;
}
#move-log .star-move { color: #ffd700; }
#move-log .pass-move { color: #80c080; }

/* ────── 設定 ────── */
select {
  background: #2a2a4a;
  color: #e0e0e0;
  border: 1px solid #555;
  border-radius: 4px;
  padding: 5px 8px;
  font-family: inherit;
  font-size: 0.82rem;
}
input[type=radio] { accent-color: #ffd700; }
label { font-size: 0.82rem; cursor: pointer; }
.setting-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
  flex-wrap: wrap;
}

/* ════════════════════════════════
   星石色選択ポップアップ
════════════════════════════════ */
#star-picker {
  display: none;
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: #16213e;
  border: 2px solid #ffd700;
  border-radius: 10px;
  padding: 16px 20px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  text-align: center;
  min-width: 220px;
}
#star-picker.visible { display: block; }
#star-picker p { font-size: 0.9rem; margin-bottom: 12px; color: #ccc; }
#star-picker .pick-row { display: flex; gap: 10px; justify-content: center; }
#star-picker button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  font-family: inherit;
  font-weight: bold;
}
#star-pick-black  { background: #222; color: #fff; border: 2px solid #555 !important; }
#star-pick-white  { background: #eee; color: #000; border: 2px solid #aaa !important; }
#star-pick-cancel { background: #444; color: #eee; margin-top: 10px; width: 100%; }

/* ════════════════════════════════
   オーバーレイ（ポップアップ背景）
════════════════════════════════ */
#overlay {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  background: rgba(0,0,0,0.5);
  z-index: 190;
}
#overlay.visible { display: block; }

/* ════════════════════════════════
   SGF プレビュー textarea
════════════════════════════════ */
#sgf-preview {
  display: none;          /* SGF生成後に表示 */
  width: 100%;
  min-height: 120px;
  max-height: 200px;
  margin-top: 10px;
  padding: 8px 10px;
  background: #0d1527;
  color: #b8ffb8;
  border: 1px solid #3a5a3a;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 0.72rem;
  line-height: 1.5;
  resize: vertical;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  -webkit-touch-callout: default;
  word-break: break-all;
  white-space: pre-wrap;
  -webkit-user-select: text;
  user-select: text;
}
#sgf-preview.visible { display: block; }
  </style>
</head>
<body>
<div id="app">

  <div id="title-bar">★ 星囲碁 プロトタイプ v1.0i</div>

  <!-- 手番・状態 -->
  <div id="status-bar">準備中…</div>

  <!-- 盤面 -->
  <div id="board-wrap">
    <canvas id="board-canvas"></canvas>
  </div>

  <!-- 星石状態（人間 vs CPU のみ表示） -->
  <div id="star-panel">
    <div class="star-row">
      <span class="star-badge" id="star-human" title="星石を使う">★</span>
      <span class="star-label" id="star-human-label">あなたの星石（未使用）</span>
    </div>
  </div>

  <!-- 主要ボタン -->
  <div id="main-btns">
    <button class="action" id="btn-pass">パス</button>
    <button class="action danger" id="btn-resign">投了</button>
    <button class="action" id="btn-reset">リセット</button>
  </div>

  <!-- 詳細セクション（折りたたみ） -->
  <div id="detail-section">

    <button id="btn-detail-toggle">
      詳細（統計・棋譜・設定）
      <span id="detail-arrow">▼</span>
    </button>

    <div id="detail-content">

      <!-- モード設定 -->
      <div class="card">
        <h2>モード設定</h2>
        <div class="setting-row">
          <label>モード:</label>
          <select id="sel-mode">
            <option value="human-expert" selected>人間 vs CPU [Expert]</option>
            <option value="human-advanced">人間 vs CPU [Advanced]</option>
            <option value="human-classic">人間 vs CPU [Classic]</option>
            <option value="cpu-advanced-expert">CPU [Advanced] vs CPU [Expert]</option>
          </select>
        </div>
        <!-- CPU vs CPU はモード名でAIの先後を指定 -->
        <div class="setting-row" id="row-cpu-level" style="display:none;">
          <label>CPU設定:</label>
          <span style="font-size:0.82rem;color:#aaa;">Classic / Advanced / Expert</span>
        </div>
        <div class="setting-row">
          <label>人間の色:</label>
          <select id="sel-color">
            <option value="0">黒</option>
            <option value="1">白</option>
          </select>
        </div>
        <div style="margin-top:10px;">
          <button class="action primary" id="btn-start">ゲーム開始</button>
        </div>
      </div>

      <!-- 失効条件 -->
      <div class="card">
        <h2>星石 失効条件</h2>
        <div class="setting-row">
          <input type="radio" name="expire" id="exp0" value="0" checked>
          <label for="exp0">1. 失効なし</label>
        </div>
        <div class="setting-row">
          <input type="radio" name="expire" id="exp1" value="1">
          <label for="exp1">2. 空点数 ≤25 で使用不可</label>
        </div>
        <div class="setting-row">
          <input type="radio" name="expire" id="exp2" value="2">
          <label for="exp2">3. 初回パス後に使用不可</label>
        </div>
      </div>

      <!-- 統計 -->
      <div class="card">
        <h2>統計</h2>
        <div id="stats-grid">
          <span class="key">総手数</span>        <span class="val" id="st-moves">0</span>
          <span class="key">パス回数</span>       <span class="val" id="st-pass">0</span>
          <span class="key">黒 星石使用手</span>  <span class="val" id="st-star-b">—</span>
          <span class="key">白 星石使用手</span>  <span class="val" id="st-star-w">—</span>
        </div>
      </div>

      <!-- 棋譜 -->
      <div class="card">
        <h2>棋譜ログ</h2>
        <div id="move-log"></div>
      </div>

      <!-- SGF出力 -->
      <div class="card">
        <h2>SGF出力</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
          <button class="action" id="btn-sgf-gen">SGFを生成</button>
          <button class="action" id="btn-sgf-copy">SGFをコピー</button>
          <button class="action" id="btn-sgf-dl">SGFをダウンロード</button>
        </div>
        <div id="sgf-msg" style="font-size:0.78rem;color:#80c080;min-height:1.4em;margin-bottom:4px;"></div>
        <textarea id="sgf-preview" readonly
          placeholder="「SGFを生成」を押すとここに表示されます。長押しで全選択→コピーできます。"
        ></textarea>
      </div>

    </div><!-- /detail-content -->
  </div><!-- /detail-section -->

</div><!-- /app -->

<!-- 星石色選択ポップアップ -->
<div id="overlay"></div>
<div id="star-picker">
  <p>★ 星石の色を選択</p>
  <div class="pick-row">
    <button id="star-pick-black">⚫ 黒</button>
    <button id="star-pick-white">⚪ 白</button>
  </div>
  <button id="star-pick-cancel">キャンセル</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  エラー画面表示ヘルパー（Safari 初期化失敗を可視化）
// ═══════════════════════════════════════════════════════════
function showFatalError(msg) {
  try {
    const sb = document.getElementById('status-bar');
    if (sb) sb.innerHTML = '<span style="color:#ff6666">⛔ 初期化エラー: ' + msg + '</span>';
  } catch(e) {}
  const errDiv = document.createElement('div');
  errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#5a0000;color:#fff;padding:12px 16px;font-size:0.9rem;z-index:9999;white-space:pre-wrap;word-break:break-all;';
  errDiv.textContent = '⛔ 初期化エラー:\n' + msg;
  document.body.insertBefore(errDiv, document.body.firstChild);
}

window.onerror = function(message, source, lineno, colno, error) {
  showFatalError(message + ' (line ' + lineno + ')');
  return false;
};

// ═══════════════════════════════════════════════════════════
//  DOM 読み込み完了後に全処理を開始
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function() {
try {

// ═══════════════════════════════════════════════════════════
//  定数
// ═══════════════════════════════════════════════════════════
const SIZE      = 9;
const CELL      = 52;
const MARGIN    = 36;
const CANVAS_PX = CELL * (SIZE - 1) + MARGIN * 2;

const BLACK = 0;
const WHITE = 1;
const EMPTY = -1;

// ─── スコア定数（Simple CPU / v1.0 強化版） ───
const SCORE_CAPTURE        = 130;  // 相手石を取れる
const SCORE_ESCAPE_ATARI   = 110;  // 自分のアタリを救う
const SCORE_NEAR_STONE     =  14;  // 隣接に石がある
const SCORE_NEAR_STONE2    =   7;  // 2手先に石がある
const SCORE_EDGE_PENALTY   = -35;  // 1線（端）
const SCORE_SECOND_LINE_OPENING_PENALTY = -10; // 序盤の2線ペナルティ（9路では弱め）
const SCORE_TERRITORY_BASE =  18;  // 地を囲いやすい空点
const SCORE_CENTER_BONUS   =   4;  // 中央偏重を避けるため弱めの加点
const SCORE_JITTER         =   8;  // ランダム揺らぎの最大値
const SIMPLE_STAR_MIN_MOVE = 10;   // 星石を使い始める最低手数
const SCORE_STAR_NEAR_OPP  = 30;   // 星石: 相手石の隣
const SCORE_STAR_NEAR_ATARI= 30;   // 星石: 自分のアタリ連の隣
const SIMPLE_AI_CANDIDATES = 10;   // 先読み対象にする候補手数（モバイル軽量化）
const SIMPLE_AI_REPLY_LIMIT = 6;    // 相手応手の候補数（モバイル軽量化）
const SIMPLE_AI_RESCUE_LIMIT = 4;   // 3手目の候補数（モバイル軽量化）
const EXPERT_AI_CANDIDATES = 18;    // Expert: 候補手数（重いが強い）
const EXPERT_AI_REPLY_LIMIT = 10;   // Expert: 相手応手候補
const EXPERT_AI_RESCUE_LIMIT = 6;   // Expert: 3手目候補

// ═══════════════════════════════════════════════════════════
//  Canvas セットアップ
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('board-canvas');
if (!canvas) throw new Error('board-canvas 要素が見つかりません');
const ctx = canvas.getContext('2d');
if (!ctx) throw new Error('Canvas 2D コンテキストを取得できません（Safari設定でCanvas無効の可能性）');
canvas.width  = CANVAS_PX;
canvas.height = CANVAS_PX;

// ═══════════════════════════════════════════════════════════
//  ゲーム状態
// ═══════════════════════════════════════════════════════════
let board    = [];
let current  = BLACK;
let koPoint  = null;
let gameOver = false;

let starStones = new Set();
let starUsed   = [false, false];
let starMoveNo = [null, null];
let starPending      = false;
let pendingStarColor = null;

let totalMoves        = 0;
let passCnt           = 0;
let consecutivePasses = 0;
let firstPassDone     = false;
let moveLog           = [];

// モード: 'human-expert' | 'human-advanced' | 'human-classic' | CPU同士比較
let gameMode   = 'human-expert';
let cpuLevel   = 'expert';
let humanColor = BLACK;
let expireMode = 0;

let cpuTimer = null;
let cpuTimeout = null;

// ═══════════════════════════════════════════════════════════
//  盤面描画
// ═══════════════════════════════════════════════════════════
function drawBoard() {
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);

  ctx.strokeStyle = '#5a3e1b';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const p = MARGIN + i * CELL;
    ctx.beginPath(); ctx.moveTo(p, MARGIN); ctx.lineTo(p, MARGIN + (SIZE-1)*CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(MARGIN, p); ctx.lineTo(MARGIN + (SIZE-1)*CELL, p); ctx.stroke();
  }

  ctx.fillStyle = '#5a3e1b';
  for (const hi of [2, 4, 6]) {
    for (const hj of [2, 4, 6]) {
      ctx.beginPath();
      ctx.arc(MARGIN + hj*CELL, MARGIN + hi*CELL, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.fillStyle = '#5a3e1b';
  ctx.font = '11px Courier New';
  const COLS_LABEL = 'ABCDEFGHJ';
  for (let i = 0; i < SIZE; i++) {
    const p = MARGIN + i * CELL;
    ctx.textAlign = 'center';
    ctx.fillText(COLS_LABEL[i], p, MARGIN - 18);
    ctx.fillText(COLS_LABEL[i], p, MARGIN + (SIZE-1)*CELL + 26);
    ctx.textAlign = 'right';
    ctx.fillText(String(SIZE - i), MARGIN - 14, MARGIN + i*CELL + 4);
    ctx.textAlign = 'left';
    ctx.fillText(String(SIZE - i), MARGIN + (SIZE-1)*CELL + 12, MARGIN + i*CELL + 4);
  }

  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (board[y][x] !== EMPTY) drawStone(x, y, board[y][x]);

  if (koPoint) {
    const kx = MARGIN + koPoint.x * CELL;
    const ky = MARGIN + koPoint.y * CELL;
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 2;
    ctx.strokeRect(kx - 6, ky - 6, 12, 12);
  }
}

function drawStone(x, y, color) {
  const cx = MARGIN + x * CELL;
  const cy = MARGIN + y * CELL;
  const r  = CELL * 0.44;
  const isStar = starStones.has(`${x},${y}`);

  const grad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.05, cx, cy, r);
  if (color === BLACK) {
    grad.addColorStop(0, '#555'); grad.addColorStop(1, '#111');
  } else {
    grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#bbb');
  }

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  if (isStar) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.fillStyle    = color === BLACK ? '#ffd700' : '#b8860b';
    ctx.font         = `bold ${Math.round(r * 0.9)}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', cx, cy + 1);
    ctx.textBaseline = 'alphabetic';
  } else {
    ctx.strokeStyle = color === BLACK ? '#333' : '#999';
    ctx.lineWidth   = 0.5;
    ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════
//  囲碁ロジック（v0.5 から変更なし）
// ═══════════════════════════════════════════════════════════
function initBoard() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  starStones.clear();
}

function inBounds(x, y) { return x >= 0 && x < SIZE && y >= 0 && y < SIZE; }

function neighbors(x, y) {
  return [[x-1,y],[x+1,y],[x,y-1],[x,y+1]].filter(([nx,ny]) => inBounds(nx,ny));
}

function getGroup(brd, x, y) {
  const color     = brd[y][x];
  const stones    = [];
  const liberties = new Set();
  const visited   = new Set();
  const stack     = [[x, y]];

  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = `${cx},${cy}`;
    if (visited.has(key)) continue;
    visited.add(key);
    stones.push([cx, cy]);
    for (const [nx, ny] of neighbors(cx, cy)) {
      if (brd[ny][nx] === EMPTY) {
        liberties.add(`${nx},${ny}`);
      } else if (brd[ny][nx] === color && !visited.has(`${nx},${ny}`)) {
        stack.push([nx, ny]);
      }
    }
  }
  return { stones, liberties };
}

function placeStone(brd, x, y, color, isStar, koP) {
  if (brd[y][x] !== EMPTY) return { ok: false };
  if (koP && koP.x === x && koP.y === y) return { ok: false };

  brd[y][x] = color;
  if (isStar) starStones.add(`${x},${y}`);

  const opp = 1 - color;
  const captured = [];

  for (const [nx, ny] of neighbors(x, y)) {
    if (brd[ny][nx] === opp) {
      const g = getGroup(brd, nx, ny);
      if (g.liberties.size === 0) {
        for (const [sx, sy] of g.stones) {
          brd[sy][sx] = EMPTY;
          starStones.delete(`${sx},${sy}`);
          captured.push([sx, sy]);
        }
      }
    }
  }

  const self = getGroup(brd, x, y);
  if (self.liberties.size === 0) {
    brd[y][x] = EMPTY;
    if (isStar) starStones.delete(`${x},${y}`);
    for (const [sx, sy] of captured) brd[sy][sx] = opp;
    return { ok: false };
  }

  let newKo = null;
  if (captured.length === 1 && self.stones.length === 1) {
    newKo = { x: captured[0][0], y: captured[0][1] };
  }
  return { ok: true, captured, newKo };
}

function isLegal(brd, x, y, color, koP) {
  if (brd[y][x] !== EMPTY) return false;
  if (koP && koP.x === x && koP.y === y) return false;
  const tmp       = brd.map(r => [...r]);
  const savedStar = new Set(starStones);
  const result    = placeStone(tmp, x, y, color, false, null);
  starStones.clear();
  savedStar.forEach(s => starStones.add(s));
  return result.ok;
}

function getLegalMoves(brd, color, koP) {
  const moves = [];
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (isLegal(brd, x, y, color, koP)) moves.push([x, y]);
  return moves;
}

function countEmpty() {
  let n = 0;
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (board[y][x] === EMPTY) n++;
  return n;
}

// ═══════════════════════════════════════════════════════════
//  星石 失効チェック
// ═══════════════════════════════════════════════════════════
function canUseStarStone(playerColor) {
  if (starUsed[playerColor]) return false;
  switch (expireMode) {
    case 0: return true;
    case 1: return countEmpty() > 25;
    case 2: return !firstPassDone;
    default: return true;
  }
}

// ═══════════════════════════════════════════════════════════
//  Simple CPU ヘルパー関数（v1.0 強化版）
//  ・地（陣地）候補の評価
//  ・序盤の低線ペナルティ
//  ・簡易3手読み: 自分 → 相手 → 自分
// ═══════════════════════════════════════════════════════════

function cloneBoard(brd) { return brd.map(r => [...r]); }

// シミュレーション専用。星石集合を触らない純粋着手。
function placeStonePure(brd, x, y, color, koP) {
  if (brd[y][x] !== EMPTY) return { ok: false };
  if (koP && koP.x === x && koP.y === y) return { ok: false };

  brd[y][x] = color;
  const opp = 1 - color;
  const captured = [];

  for (const [nx, ny] of neighbors(x, y)) {
    if (brd[ny][nx] === opp) {
      const g = getGroup(brd, nx, ny);
      if (g.liberties.size === 0) {
        for (const [sx, sy] of g.stones) {
          brd[sy][sx] = EMPTY;
          captured.push([sx, sy]);
        }
      }
    }
  }

  const self = getGroup(brd, x, y);
  if (self.liberties.size === 0) {
    brd[y][x] = EMPTY;
    for (const [sx, sy] of captured) brd[sy][sx] = opp;
    return { ok: false };
  }

  let newKo = null;
  if (captured.length === 1 && self.stones.length === 1) {
    newKo = { x: captured[0][0], y: captured[0][1] };
  }
  return { ok: true, captured, newKo };
}

function isLegalPure(brd, x, y, color, koP) {
  if (brd[y][x] !== EMPTY) return false;
  if (koP && koP.x === x && koP.y === y) return false;
  const tmp = cloneBoard(brd);
  return placeStonePure(tmp, x, y, color, koP).ok;
}

function getLegalMovesPure(brd, color, koP) {
  const moves = [];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (isLegalPure(brd, x, y, color, koP)) moves.push([x, y]);
    }
  }
  return moves;
}

function captureCount(x, y, color) {
  const brd = cloneBoard(board);
  const result = placeStonePure(brd, x, y, color, koPoint);
  return result.ok ? result.captured.length : 0;
}

function getAtariPointsOn(brd, color) {
  const atariPoints = new Set();
  const visited = new Set();
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== color) continue;
      const key = `${x},${y}`;
      if (visited.has(key)) continue;
      const g = getGroup(brd, x, y);
      g.stones.forEach(([sx, sy]) => visited.add(`${sx},${sy}`));
      if (g.liberties.size === 1) {
        g.liberties.forEach(lib => atariPoints.add(lib));
        for (const [sx, sy] of g.stones) {
          for (const [nx, ny] of neighbors(sx, sy)) {
            if (brd[ny][nx] === EMPTY) atariPoints.add(`${nx},${ny}`);
          }
        }
      }
    }
  }
  return atariPoints;
}

function getAtariPoints(color) { return getAtariPointsOn(board, color); }

function hasAdjacentStoneOn(brd, x, y) {
  return neighbors(x, y).some(([nx, ny]) => brd[ny][nx] !== EMPTY);
}
function hasAdjacentStone(x, y) { return hasAdjacentStoneOn(board, x, y); }

function hasNearbyStoneOn(brd, x, y) {
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny) && brd[ny][nx] !== EMPTY) return true;
    }
  }
  return false;
}
function hasNearbyStone(x, y) { return hasNearbyStoneOn(board, x, y); }

function isEdge(x, y) { return x === 0 || x === SIZE - 1 || y === 0 || y === SIZE - 1; }
function isSecondLine(x, y) { return x === 1 || x === SIZE - 2 || y === 1 || y === SIZE - 2; }
function isCenterish(x, y) { return x >= 2 && x <= SIZE - 3 && y >= 2 && y <= SIZE - 3; }
function openingPhase(moveNo) { return moveNo < 18; }
function middlePhase(moveNo) { return moveNo >= 18 && moveNo < 48; }

function countAround(brd, x, y, color, radius) {
  let own = 0, opp = 0, empty = 0;
  const enemy = 1 - color;
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      if (!inBounds(nx, ny)) continue;
      const v = brd[ny][nx];
      if (v === color) own++;
      else if (v === enemy) opp++;
      else empty++;
    }
  }
  return { own, opp, empty };
}


// 9路の布石感覚を少しだけ持たせるための領域評価。
// Advanced v1.0f: 中央団子を避け、四隅・辺・未開拓エリアに足場を作る。
function quadrantOf(x, y) {
  if (x <= 3 && y <= 3) return 0;      // 左上
  if (x >= 5 && y <= 3) return 1;      // 右上
  if (x <= 3 && y >= 5) return 2;      // 左下
  if (x >= 5 && y >= 5) return 3;      // 右下
  return -1;                           // 中央帯
}

function quadrantCounts(brd, color) {
  const counts = [0, 0, 0, 0];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== color) continue;
      const q = quadrantOf(x, y);
      if (q >= 0) counts[q]++;
    }
  }
  return counts;
}

function positionValue(x, y) {
  // 9路では三々・星付近（内部 2/6）が足場として強い。
  let v = 0;
  if ((x === 2 || x === 6) && (y === 2 || y === 6)) v += 18;
  if (x === 2 || x === 6 || y === 2 || y === 6) v += 6;
  if (isEdge(x, y)) v -= 7;
  if (x >= 3 && x <= 5 && y >= 3 && y <= 5) v -= 2; // 中央偏重を抑える
  return v;
}

function localDensityPenalty(brd, x, y, color, moveNo) {
  const r1 = countAround(brd, x, y, color, 1);
  const r2 = countAround(brd, x, y, color, 2);
  let penalty = 0;
  if (openingPhase(moveNo)) {
    if (r1.own >= 2 && r1.opp === 0) penalty -= 34;
    if (r1.own >= 3) penalty -= 52;
    if (r2.own >= 4 && r2.opp <= 1) penalty -= 38;
    if (r2.own >= 6) penalty -= 70;
  } else if (middlePhase(moveNo)) {
    if (r1.own >= 3 && r1.empty <= 3) penalty -= 30;
    if (r2.own >= 7 && r2.opp <= 1) penalty -= 26;
  } else {
    // 終盤に自分の目や地を埋めすぎる癖を抑える。
    if (r1.own >= 3 && r1.opp === 0) penalty -= 34;
  }
  return penalty;
}

function openingExpansionBonus(brd, x, y, color, moveNo) {
  const opp = 1 - color;
  const ownQ = quadrantCounts(brd, color);
  const oppQ = quadrantCounts(brd, opp);
  const q = quadrantOf(x, y);
  let score = 0;

  if (openingPhase(moveNo)) {
    // 大場: 四隅・四象限へ散る。中央連打は弱める。
    if ((x === 2 || x === 6) && (y === 2 || y === 6)) score += 62;
    else if (q >= 0 && (x === 1 || x === 2 || x === 6 || x === 7) && (y === 1 || y === 2 || y === 6 || y === 7)) score += 28;
    else if (x === 2 || x === 6 || y === 2 || y === 6) score += 14;

    if (q >= 0) {
      if (ownQ[q] === 0) score += 48;
      else if (ownQ[q] === 1) score += 14;
      else if (ownQ[q] === 2) score -= 26;
      else score -= 58;

      if (oppQ[q] > ownQ[q]) score += 22; // 相手だけの地区を放置しない
    } else {
      score -= 22; // 序盤の中央帯集中を抑制
    }
  } else if (middlePhase(moveNo)) {
    if (q >= 0 && ownQ[q] === 0) score += 28;
    if (q >= 0 && oppQ[q] >= ownQ[q] + 2) score += 24;
    if (x === 2 || x === 6 || y === 2 || y === 6) score += 8;
  }
  return score;
}

function estimatedTerritoryScore(brd, color) {
  // 空点ごとの周辺影響から、ざっくり地の見込みを測る。
  const opp = 1 - color;
  let score = 0;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== EMPTY) continue;
      const mine = countAround(brd, x, y, color, 2);
      const theirs = countAround(brd, x, y, opp, 2);
      const diff = mine.own - theirs.own;
      if (diff >= 3 && mine.opp <= 1) score += 12;
      else if (diff >= 1) score += 4;
      else if (diff <= -3 && theirs.opp <= 1) score -= 12;
      else if (diff <= -1) score -= 4;

      // 辺・隅の空点は実地になりやすい。
      if (isEdge(x, y)) {
        if (mine.own > theirs.own) score += 3;
        if (theirs.own > mine.own) score -= 3;
      }
    }
  }
  return score;
}

// 空点が「自分の地の骨格」になりやすいかを評価する。
function territoryPotential(brd, x, y, color, moveNo) {
  const r1 = countAround(brd, x, y, color, 1);
  const r2 = countAround(brd, x, y, color, 2);
  let score = 0;

  // 近すぎる自石だけを高評価にしない。囲いの輪郭なら加点、団子なら別関数で減点。
  score += r1.own * 8 - r1.opp * 9;
  score += r2.own * 3 - r2.opp * 3;
  if (r1.own >= 2 && r1.opp === 0 && r1.empty >= 3) score += SCORE_TERRITORY_BASE;
  if (r2.own >= 3 && r2.opp <= 1 && r1.empty >= 2) score += 10;
  if (r1.own === 0 && r2.own === 0 && moveNo > 10) score -= 8;

  // 中央は「強い」だけで「地」ではない。加点は控えめにする。
  if (isCenterish(x, y)) score += SCORE_CENTER_BONUS;
  score += positionValue(x, y);

  if (openingPhase(moveNo)) {
    if (isEdge(x, y)) score += SCORE_EDGE_PENALTY * 1.4;
    else if (isSecondLine(x, y)) score += SCORE_SECOND_LINE_OPENING_PENALTY;
  } else if (middlePhase(moveNo)) {
    if (isEdge(x, y)) score += SCORE_EDGE_PENALTY * 0.7;
  } else {
    if (isEdge(x, y)) score -= 4;
  }
  return score;
}

function groupLibertyScore(brd, color) {
  let score = 0;
  const visited = new Set();
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== color) continue;
      const key = `${x},${y}`;
      if (visited.has(key)) continue;
      const g = getGroup(brd, x, y);
      g.stones.forEach(([sx, sy]) => visited.add(`${sx},${sy}`));
      const libs = g.liberties.size;
      score += Math.min(libs, 5) * 7;
      if (libs === 1) score -= 75 + g.stones.length * 12;
      else if (libs === 2) score -= 18;
      if (g.stones.length >= 3 && libs >= 3) score += 12;
    }
  }
  return score;
}

function starThreatPenalty(brd, color, oppHasStar) {
  if (!oppHasStar) return 0;
  let penalty = 0;
  const visited = new Set();
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== color) continue;
      const key = `${x},${y}`;
      if (visited.has(key)) continue;
      const g = getGroup(brd, x, y);
      g.stones.forEach(([sx, sy]) => visited.add(`${sx},${sy}`));
      const libs = g.liberties.size;
      if (libs === 1) penalty -= 42 + g.stones.length * 10;
      else if (libs === 2) penalty -= 16 + g.stones.length * 3;
    }
  }
  return penalty;
}

function evaluateBoard(brd, color) {
  // 必ず「color側に有利なら高得点」で返す。白番でも評価軸を反転しない。
  const opp = 1 - color;
  let score = 0;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const v = brd[y][x];
      if (v === color) score += 15 + positionValue(x, y) * 0.6;
      else if (v === opp) score -= 15 + positionValue(x, y) * 0.6;
      else {
        const ownInf = countAround(brd, x, y, color, 2);
        const oppInf = countAround(brd, x, y, opp, 2);
        const influence = ownInf.own - oppInf.own;
        score += influence * 2.6;
        if (ownInf.own >= 3 && oppInf.own <= 1) score += 9;
        if (oppInf.own >= 3 && ownInf.own <= 1) score -= 9;
      }
    }
  }
  score += estimatedTerritoryScore(brd, color) * 1.15;
  score += groupLibertyScore(brd, color);
  score -= groupLibertyScore(brd, opp) * 0.90;
  score += starThreatPenalty(brd, color, canUseStarStone(opp));
  return score;
}

function moveHeuristicOn(brd, x, y, color, koP, moveNo) {
  const tmp = cloneBoard(brd);
  const result = placeStonePure(tmp, x, y, color, koP);
  if (!result.ok) return -Infinity;

  const opp = 1 - color;
  const atariPoints = getAtariPointsOn(brd, color);
  const oppAtari = getAtariPointsOn(brd, opp);
  const selfAfter = getGroup(tmp, x, y);
  let score = 0;

  const tactical = result.captured.length > 0 || atariPoints.has(`${x},${y}`) || oppAtari.has(`${x},${y}`);

  if (result.captured.length > 0) score += SCORE_CAPTURE + result.captured.length * 20;
  if (atariPoints.has(`${x},${y}`)) score += SCORE_ESCAPE_ATARI;
  if (oppAtari.has(`${x},${y}`)) score += 36;

  const libs = selfAfter.liberties.size;
  score += Math.min(libs, 5) * 12;
  if (libs === 1) score -= 120;
  else if (libs === 2) score -= 30;

  score += territoryPotential(brd, x, y, color, moveNo);
  score += openingExpansionBonus(brd, x, y, color, moveNo);
  score += localDensityPenalty(brd, x, y, color, moveNo);

  const around1 = countAround(brd, x, y, color, 1);
  const around2 = countAround(brd, x, y, color, 2);
  if (openingPhase(moveNo)) {
    // 戦術手でない限り、同じ地区に固まりすぎる手を嫌う。
    if (!tactical && around1.own >= 2 && around1.opp === 0) score -= 30;
    if (!tactical && around2.own >= 5 && around2.opp <= 1) score -= 44;
  } else {
    if (!tactical && around1.own >= 3 && around1.empty <= 3) score -= 30;
  }

  if (hasAdjacentStoneOn(brd, x, y)) score += SCORE_NEAR_STONE * 0.45;
  else if (hasNearbyStoneOn(brd, x, y)) score += SCORE_NEAR_STONE2;
  else if (!openingPhase(moveNo)) score -= 8;

  score += evaluateBoard(tmp, color) * 0.20;
  return score;
}

function topMoves(brd, moves, color, koP, moveNo, limit) {
  return moves
    .map(([x, y]) => ({ x, y, score: moveHeuristicOn(brd, x, y, color, koP, moveNo) }))
    .filter(m => Number.isFinite(m.score))
    .sort((a, b) => b.score - a.score)
    .slice(0, limit);
}

function lookaheadScore(x, y, color) {
  const opp = 1 - color;
  const moveNo = totalMoves + 1;
  const first = cloneBoard(board);
  const firstResult = placeStonePure(first, x, y, color, koPoint);
  if (!firstResult.ok) return -Infinity;

  const firstScore = evaluateBoard(first, color) + moveHeuristicOn(board, x, y, color, koPoint, moveNo);
  const oppMoves = getLegalMovesPure(first, opp, firstResult.newKo);
  if (oppMoves.length === 0) return firstScore + 35;

  const oppCandidates = topMoves(first, oppMoves, opp, firstResult.newKo, moveNo + 1, SIMPLE_AI_REPLY_LIMIT);
  if (oppCandidates.length === 0) return firstScore;

  // 相手は「こちらの評価を最小化する」手を選ぶ。接待読みは禁止。
  let worstAfterReply = Infinity;

  for (const reply of oppCandidates) {
    const second = cloneBoard(first);
    const secondResult = placeStonePure(second, reply.x, reply.y, opp, firstResult.newKo);
    if (!secondResult.ok) continue;

    let afterReplyScore = evaluateBoard(second, color);
    const myReplies = getLegalMovesPure(second, color, secondResult.newKo);
    if (myReplies.length > 0) {
      const myCandidates = topMoves(second, myReplies, color, secondResult.newKo, moveNo + 2, SIMPLE_AI_RESCUE_LIMIT);
      let bestRescue = -Infinity;
      for (const rescue of myCandidates) {
        const third = cloneBoard(second);
        const thirdResult = placeStonePure(third, rescue.x, rescue.y, color, secondResult.newKo);
        if (!thirdResult.ok) continue;
        const rescueScore = evaluateBoard(third, color) + rescue.score * 0.35;
        if (rescueScore > bestRescue) bestRescue = rescueScore;
      }
      if (bestRescue > -Infinity) afterReplyScore = afterReplyScore * 0.50 + bestRescue * 0.50;
    }
    if (afterReplyScore < worstAfterReply) worstAfterReply = afterReplyScore;
  }

  if (worstAfterReply === Infinity) return firstScore;
  return firstScore * 0.45 + worstAfterReply * 0.55;
}

function chooseStarUse(pick, color, moveNo) {
  const opp = 1 - color;
  let useStar = false;
  let starColor = color;
  if (canUseStarStone(color) && totalMoves >= SIMPLE_STAR_MIN_MOVE) {
    let starScore = 0;
    for (const [nx, ny] of neighbors(pick.x, pick.y)) {
      if (board[ny][nx] === opp) { starScore += SCORE_STAR_NEAR_OPP; break; }
    }
    const atariPoints = getAtariPoints(color);
    if (atariPoints.has(`${pick.x},${pick.y}`)) starScore += SCORE_STAR_NEAR_ATARI;
    const terr = territoryPotential(board, pick.x, pick.y, color, moveNo);
    if (terr >= 36) starScore += 10;
    if (pick.score >= 190) starScore += 10;
    const USE_STAR_THRESHOLD = 46;
    if (starScore >= USE_STAR_THRESHOLD || (pick.score >= 230 && Math.random() < 0.08)) {
      useStar = true;
      const around = countAround(board, pick.x, pick.y, color, 1);
      starColor = around.opp >= 2 && Math.random() < 0.18 ? opp : color;
    }
  }
  return { useStar, starColor };
}


// ═══════════════════════════════════════════════════════════
//  Expert CPU v1.0i
//  ・9路星囲碁専用の布石感覚
//  ・空点領域の実地推定
//  ・弱い連の救出 / 相手弱連への圧力
//  ・Advancedより重いが、スマホでも止まりにくい浅深度探索
// ═══════════════════════════════════════════════════════════

function expertPhase(moveNo) {
  if (moveNo < 14) return 'opening';
  if (moveNo < 44) return 'middle';
  return 'endgame';
}

function expertAnchorValue(x, y) {
  // 9路の実戦感覚: 三々・星付近・辺の根拠を重視し、中央一点主義を避ける。
  let v = 0;
  if ((x === 2 || x === 6) && (y === 2 || y === 6)) v += 42;
  if ((x === 2 || x === 6) && (y === 3 || y === 5)) v += 20;
  if ((y === 2 || y === 6) && (x === 3 || x === 5)) v += 20;
  if ((x === 1 || x === 7) && (y === 2 || y === 6)) v += 10;
  if ((y === 1 || y === 7) && (x === 2 || x === 6)) v += 10;
  if (x >= 3 && x <= 5 && y >= 3 && y <= 5) v -= 14;
  if (x === 4 && y === 4) v -= 20;
  if (isEdge(x, y)) v -= 24;
  return v;
}

function emptyRegionScore(brd, color) {
  const opp = 1 - color;
  const seen = new Set();
  let score = 0;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== EMPTY) continue;
      const start = `${x},${y}`;
      if (seen.has(start)) continue;
      const stack = [[x, y]];
      const region = [];
      const border = new Set();
      seen.add(start);
      while (stack.length) {
        const [cx, cy] = stack.pop();
        region.push([cx, cy]);
        for (const [nx, ny] of neighbors(cx, cy)) {
          const v = brd[ny][nx];
          if (v === EMPTY) {
            const k = `${nx},${ny}`;
            if (!seen.has(k)) { seen.add(k); stack.push([nx, ny]); }
          } else {
            border.add(v);
          }
        }
      }
      const n = region.length;
      if (border.size === 1 && border.has(color)) score += n * 24;
      else if (border.size === 1 && border.has(opp)) score -= n * 24;
      else {
        let ownInf = 0, oppInf = 0, edgeTouch = 0;
        for (const [rx, ry] of region) {
          const own = countAround(brd, rx, ry, color, 2).own;
          const enemy = countAround(brd, rx, ry, opp, 2).own;
          ownInf += own;
          oppInf += enemy;
          if (isEdge(rx, ry)) edgeTouch++;
        }
        score += (ownInf - oppInf) * 1.8;
        if (edgeTouch > 0) score += Math.sign(ownInf - oppInf) * Math.min(10, edgeTouch * 2);
      }
    }
  }
  return score;
}

function expertGroupScore(brd, color) {
  const opp = 1 - color;
  let score = 0;
  const visited = new Set();
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (brd[y][x] !== color) continue;
      const key = `${x},${y}`;
      if (visited.has(key)) continue;
      const g = getGroup(brd, x, y);
      g.stones.forEach(([sx, sy]) => visited.add(`${sx},${sy}`));
      const libs = g.liberties.size;
      const size = g.stones.length;
      score += size * 10 + Math.min(libs, 7) * 13;
      if (libs === 1) score -= 160 + size * 28;
      else if (libs === 2) score -= 52 + size * 10;
      else if (libs >= 4) score += 22 + Math.min(size, 5) * 5;

      // 眼っぽい呼吸点を少し見る。完全な死活ではないが、終盤の生存判断に効く。
      let eyeish = 0;
      g.liberties.forEach(lib => {
        const [lx, ly] = lib.split(',').map(Number);
        const around = neighbors(lx, ly);
        const ownN = around.filter(([nx, ny]) => brd[ny][nx] === color).length;
        const oppN = around.filter(([nx, ny]) => brd[ny][nx] === opp).length;
        if (ownN >= 2 && oppN === 0) eyeish++;
      });
      if (eyeish >= 2) score += 55;
      else if (eyeish === 1) score += 18;
    }
  }
  return score;
}

function expertTerritoryMoveShape(brd, x, y, color, moveNo) {
  const opp = 1 - color;
  const phase = expertPhase(moveNo);
  const r1 = countAround(brd, x, y, color, 1);
  const r2 = countAround(brd, x, y, color, 2);
  const enemy1 = countAround(brd, x, y, opp, 1);
  let score = 0;

  score += expertAnchorValue(x, y);

  // 自石密集の団子を強く嫌う。戦術手なら別途加点されるので、形の悪さだけ見る。
  if (r1.own >= 3 && r1.opp === 0) score -= 72;
  if (r2.own >= 6 && r2.opp <= 1) score -= 66;
  if (phase === 'opening') {
    const q = quadrantOf(x, y);
    const ownQ = quadrantCounts(brd, color);
    const oppQ = quadrantCounts(brd, opp);
    if (q >= 0) {
      if (ownQ[q] === 0) score += 58;
      else if (ownQ[q] === 1) score += 18;
      else score -= 36 * (ownQ[q] - 1);
      if (oppQ[q] >= ownQ[q] + 1) score += 26;
    } else {
      score -= 34;
    }
    if (isEdge(x, y)) score -= 58;
    if (isSecondLine(x, y) && r1.opp === 0) score -= 16;
  }

  // 囲う輪郭は評価、地を自分で埋めるだけの手は減点。
  if (r1.own >= 2 && r1.opp === 0 && r1.empty >= 3) score += 30;
  if (r2.own >= 3 && r2.opp <= 1 && r1.empty >= 2) score += 18;
  if (phase === 'endgame' && r1.own >= 3 && r1.opp === 0 && r1.empty <= 2) score -= 50;

  // 相手の根拠に近い大場や消しは評価。
  if (enemy1.opp >= 1 && r1.own >= 1) score += 22;
  if (r2.opp >= 4 && r2.own <= 1) score += 30;
  return score;
}

function expertEvaluateBoard(brd, color) {
  const opp = 1 - color;
  let score = 0;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const v = brd[y][x];
      if (v === color) score += 18 + expertAnchorValue(x, y) * 0.25;
      else if (v === opp) score -= 18 + expertAnchorValue(x, y) * 0.25;
      else {
        const own = countAround(brd, x, y, color, 2).own;
        const enemy = countAround(brd, x, y, opp, 2).own;
        score += (own - enemy) * 2.2;
      }
    }
  }
  score += emptyRegionScore(brd, color) * 1.20;
  score += expertGroupScore(brd, color) * 1.05;
  score -= expertGroupScore(brd, opp) * 1.00;
  score += starThreatPenalty(brd, color, canUseStarStone(opp)) * 0.55;
  return score;
}


function recentCoordinatePenalty(x, y, color) {
  // 直近の取り返し・反復地点に吸い寄せられる癖を抑える。
  // 捕獲で空いた点への再着手自体は合法なので、禁止ではなく減点に留める。
  let penalty = 0;
  const lookback = Math.min(moveLog.length, 16);
  for (let i = 0; i < lookback; i++) {
    const e = moveLog[moveLog.length - 1 - i];
    if (!e || e.type !== 'place') continue;
    const dist = Math.abs(e.x - x) + Math.abs(e.y - y);
    const weight = Math.max(1, 8 - i * 0.45);
    if (dist === 0) penalty -= 34 * weight;
    else if (dist === 1) penalty -= 5 * Math.max(1, 5 - i * 0.3);
  }

  // 直近2手の同一点・隣接地点へ戻る「ぐるぐる」を特に嫌う。
  const lastPlaces = moveLog.filter(e => e && e.type === 'place').slice(-4);
  for (const e of lastPlaces) {
    if (e.x === x && e.y === y) penalty -= 95;
  }
  return penalty;
}

function expertMoveHeuristicOn(brd, x, y, color, koP, moveNo, checkReplies = true) {
  const tmp = cloneBoard(brd);
  const result = placeStonePure(tmp, x, y, color, koP);
  if (!result.ok) return -Infinity;
  const opp = 1 - color;
  const selfAfter = getGroup(tmp, x, y);
  const atariPoints = getAtariPointsOn(brd, color);
  const oppAtari = getAtariPointsOn(brd, opp);
  let score = 0;

  score += recentCoordinatePenalty(x, y, color);

  if (result.captured.length > 0) score += 220 + result.captured.length * 45;
  if (atariPoints.has(`${x},${y}`)) score += 180;
  if (oppAtari.has(`${x},${y}`)) score += 88;

  const libs = selfAfter.liberties.size;
  score += Math.min(libs, 7) * 18;
  if (libs === 1) score -= 260;
  else if (libs === 2) score -= 70;
  else if (libs >= 4) score += 28;

  score += expertTerritoryMoveShape(brd, x, y, color, moveNo);
  score += expertEvaluateBoard(tmp, color) * 0.23;

  // 相手の次の一撃で取られやすい形は、読みに入る前から嫌う。
  // ただし候補生成中にここへ入ると topExpertMoves → expertMoveHeuristicOn が
  // 再帰してSafariで Maximum call stack size exceeded になるため、
  // checkReplies=false のときは必ず浅い評価で止める。
  if (checkReplies) {
    const oppMoves = getLegalMovesPure(tmp, opp, result.newKo);
    const sharpReplies = topExpertMoves(tmp, oppMoves, opp, result.newKo, moveNo + 1, Math.min(5, EXPERT_AI_REPLY_LIMIT));
    if (sharpReplies.length) {
      let worst = 0;
      for (const r of sharpReplies) {
        const after = cloneBoard(tmp);
        const rr = placeStonePure(after, r.x, r.y, opp, result.newKo);
        if (!rr.ok) continue;
        const loss = expertEvaluateBoard(tmp, color) - expertEvaluateBoard(after, color);
        if (loss > worst) worst = loss;
      }
      score -= worst * 0.18;
    }
  }
  return score;
}

function topExpertMoves(brd, moves, color, koP, moveNo, limit) {
  return moves
    .map(([x, y]) => ({ x, y, score: expertMoveHeuristicOn(brd, x, y, color, koP, moveNo, false) }))
    .filter(m => Number.isFinite(m.score))
    .sort((a, b) => b.score - a.score)
    .slice(0, limit);
}

function expertLookaheadScore(x, y, color) {
  const opp = 1 - color;
  const moveNo = totalMoves + 1;
  const first = cloneBoard(board);
  const firstResult = placeStonePure(first, x, y, color, koPoint);
  if (!firstResult.ok) return -Infinity;
  const firstScore = expertEvaluateBoard(first, color) + expertMoveHeuristicOn(board, x, y, color, koPoint, moveNo);
  const oppMoves = getLegalMovesPure(first, opp, firstResult.newKo);
  if (oppMoves.length === 0) return firstScore + 80;

  const oppCandidates = topExpertMoves(first, oppMoves, opp, firstResult.newKo, moveNo + 1, EXPERT_AI_REPLY_LIMIT);
  if (!oppCandidates.length) return firstScore;

  let worstAfterReply = Infinity;
  for (const reply of oppCandidates) {
    const second = cloneBoard(first);
    const secondResult = placeStonePure(second, reply.x, reply.y, opp, firstResult.newKo);
    if (!secondResult.ok) continue;
    let afterReplyScore = expertEvaluateBoard(second, color);
    const myReplies = getLegalMovesPure(second, color, secondResult.newKo);
    if (myReplies.length) {
      const myCandidates = topExpertMoves(second, myReplies, color, secondResult.newKo, moveNo + 2, EXPERT_AI_RESCUE_LIMIT);
      let bestRescue = -Infinity;
      for (const rescue of myCandidates) {
        const third = cloneBoard(second);
        const thirdResult = placeStonePure(third, rescue.x, rescue.y, color, secondResult.newKo);
        if (!thirdResult.ok) continue;
        const v = expertEvaluateBoard(third, color) + rescue.score * 0.28;
        if (v > bestRescue) bestRescue = v;
      }
      if (bestRescue > -Infinity) afterReplyScore = afterReplyScore * 0.42 + bestRescue * 0.58;
    }
    if (afterReplyScore < worstAfterReply) worstAfterReply = afterReplyScore;
  }
  if (worstAfterReply === Infinity) return firstScore;
  return firstScore * 0.38 + worstAfterReply * 0.62;
}

function expertOpeningBook(legalMoves, color, moveNo) {
  if (moveNo > 8) return null;
  const anchors = [
    [2, 2], [6, 6], [6, 2], [2, 6],
    [4, 2], [2, 4], [6, 4], [4, 6]
  ];
  const legalSet = new Set(legalMoves.map(([x, y]) => `${x},${y}`));
  let best = null;
  for (const [x, y] of anchors) {
    if (!legalSet.has(`${x},${y}`)) continue;
    const score = expertMoveHeuristicOn(board, x, y, color, koPoint, moveNo) + expertAnchorValue(x, y) * 1.4;
    if (!best || score > best.score) best = { x, y, score };
  }
  return best;
}

function chooseExpertStarUse(pick, color, moveNo) {
  const opp = 1 - color;
  let useStar = false;
  let starColor = color;
  if (!canUseStarStone(color) || totalMoves < 12) return { useStar, starColor };
  const atariPoints = getAtariPoints(color);
  const oppAtari = getAtariPoints(opp);
  let starScore = 0;
  if (atariPoints.has(`${pick.x},${pick.y}`)) starScore += 60;
  if (oppAtari.has(`${pick.x},${pick.y}`)) starScore += 52;
  const r1 = countAround(board, pick.x, pick.y, color, 1);
  const r2 = countAround(board, pick.x, pick.y, color, 2);
  if (r1.opp >= 2 && r1.own >= 1) starScore += 42; // 切断・競り合い
  if (r2.opp >= 4 && r2.own <= 2) starScore += 30; // 消し
  if (pick.score >= 260) starScore += 20;
  if (starScore >= 78) useStar = true;
  return { useStar, starColor };
}

function isValidDecisionForCurrentBoard(decision, color) {
  if (!decision) return false;
  if (!Number.isInteger(decision.x) || !Number.isInteger(decision.y)) return false;
  if (!inBounds(decision.x, decision.y)) return false;
  if (board[decision.y][decision.x] !== EMPTY) return false;
  const stoneColor = decision.useStar ? decision.starColor : color;
  if (stoneColor !== BLACK && stoneColor !== WHITE) return false;
  const tmp = cloneBoard(board);
  return placeStonePure(tmp, decision.x, decision.y, stoneColor, koPoint).ok;
}

function fallbackLegalDecision(legalMoves, color, moveNo) {
  // どのAI評価が壊れても、合法手がある限り絶対にパスへ落とさない最後の網。
  let best = null;
  for (const [x, y] of legalMoves) {
    let score = 0;
    try {
      score = moveHeuristicOn(board, x, y, color, koPoint, moveNo)
            + expertAnchorValue(x, y) * 0.5
            + recentCoordinatePenalty(x, y, color);
    } catch(e) {
      score = -9999 + Math.random();
    }
    if (!best || score > best.score) best = { x, y, score };
  }
  const m = best || { x: legalMoves[0][0], y: legalMoves[0][1], score: 0 };
  return { x: m.x, y: m.y, useStar: false, starColor: color };
}

function expertAI(legalMoves, color) {
  if (legalMoves.length === 0) return null;
  const moveNo = totalMoves + 1;
  const fallback = fallbackLegalDecision(legalMoves, color, moveNo);
  let book = null;
  let candidates = [];
  try { book = expertOpeningBook(legalMoves, color, moveNo); } catch(e) { book = null; }
  try { candidates = topExpertMoves(board, legalMoves, color, koPoint, moveNo, EXPERT_AI_CANDIDATES); } catch(e) { candidates = []; }
  const base = candidates.length ? candidates : legalMoves.map(([x, y]) => ({
    x, y,
    score: expertMoveHeuristicOn(board, x, y, color, koPoint, moveNo, false)
  })).filter(m => Number.isFinite(m.score));

  const scored = base.map(m => {
    let reading = -999999;
    try { reading = expertLookaheadScore(m.x, m.y, color); } catch(e) { reading = -999999; }
    const safeReading = Number.isFinite(reading) ? reading : -999999;
    let score = m.score * 0.46 + safeReading * 0.54;
    score += recentCoordinatePenalty(m.x, m.y, color) * 0.45;
    if (book && m.x === book.x && m.y === book.y) score += 55;
    return { x: m.x, y: m.y, score, baseScore: m.score, reading: safeReading };
  }).filter(m => Number.isFinite(m.score)).sort((a, b) => b.score - a.score);

  const rawPick = scored[0] || book || fallback;
  const star = chooseExpertStarUse(rawPick, color, moveNo);
  let decision = { x: rawPick.x, y: rawPick.y, useStar: star.useStar, starColor: star.starColor };

  // 星石色での自殺・コウなどを避ける。星石が危険なら通常手に降格する。
  if (!isValidDecisionForCurrentBoard(decision, color)) {
    decision = { x: rawPick.x, y: rawPick.y, useStar: false, starColor: color };
  }
  if (!isValidDecisionForCurrentBoard(decision, color)) {
    decision = fallback;
  }
  return decision;
}

function classicAI(legalMoves, color) {
  if (legalMoves.length === 0) return null;
  const moveNo = totalMoves + 1;
  const candidates = topMoves(board, legalMoves, color, koPoint, moveNo, 8);
  const pick = candidates[0] || { x: legalMoves[0][0], y: legalMoves[0][1], score: 0 };
  const star = chooseStarUse(pick, color, moveNo);
  return { x: pick.x, y: pick.y, useStar: star.useStar, starColor: star.starColor };
}

function advancedAI(legalMoves, color) {
  if (legalMoves.length === 0) return null;
  const moveNo = totalMoves + 1;
  const candidates = topMoves(board, legalMoves, color, koPoint, moveNo, SIMPLE_AI_CANDIDATES);
  const base = candidates.length ? candidates : legalMoves.map(([x, y]) => ({ x, y, score: 0 }));

  const scored = base.map(m => {
    const reading = lookaheadScore(m.x, m.y, color);
    const safeReading = Number.isFinite(reading) ? reading : -999999;
    const score = m.score * 0.50 + safeReading * 0.50 + Math.random() * SCORE_JITTER;
    return { x: m.x, y: m.y, score, baseScore: m.score, reading: safeReading };
  }).filter(m => Number.isFinite(m.score)).sort((a, b) => b.score - a.score);

  // 合法手がある限り絶対にパスしない。全評価が壊れても先頭合法手を打つ。
  const pick = scored[0] || { x: legalMoves[0][0], y: legalMoves[0][1], score: 0 };
  const star = chooseStarUse(pick, color, moveNo);
  return { x: pick.x, y: pick.y, useStar: star.useStar, starColor: star.starColor };
}

// 後方互換: 既存の呼び出しが残っていてもAdvancedとして動かす。
function simpleAI(legalMoves, color) { return advancedAI(legalMoves, color); }

function aiForCurrentColor() {
  if (gameMode === 'human-classic') return current === humanColor ? 'human' : 'classic';
  if (gameMode === 'human-advanced') return current === humanColor ? 'human' : 'advanced';
  if (gameMode === 'human-expert') return current === humanColor ? 'human' : 'expert';
  if (gameMode === 'cpu-classic-advanced') return current === BLACK ? 'classic' : 'advanced';
  if (gameMode === 'cpu-advanced-classic') return current === BLACK ? 'advanced' : 'classic';
  if (gameMode === 'cpu-advanced-expert') return current === BLACK ? 'advanced' : 'expert';
  if (gameMode === 'cpu-expert-advanced') return current === BLACK ? 'expert' : 'advanced';
  if (gameMode === 'cpu-classic-expert') return current === BLACK ? 'classic' : 'expert';
  if (gameMode === 'cpu-expert-classic') return current === BLACK ? 'expert' : 'classic';
  return current === humanColor ? 'human' : 'expert';
}

function cpuTurn() {
  cpuTimeout = null;
  if (gameOver) return;
  const ai = aiForCurrentColor();
  if (ai === 'human') return;
  const legal = getLegalMoves(board, current, koPoint);
  if (legal.length === 0) { doPass(); return; }

  const color = current;
  const moveNo = totalMoves + 1;
  let decision = null;
  try {
    decision = ai === 'classic' ? classicAI(legal, color)
             : ai === 'expert' ? expertAI(legal, color)
             : advancedAI(legal, color);
  } catch(e) {
    decision = null;
  }

  if (!isValidDecisionForCurrentBoard(decision, color)) {
    decision = fallbackLegalDecision(legal, color, moveNo);
  }

  // ここでもう一度確認。合法手がある限り、CPUはパスではなく最善風フォールバックを打つ。
  if (!isValidDecisionForCurrentBoard(decision, color)) {
    const [x, y] = legal[0];
    decision = { x, y, useStar: false, starColor: color };
  }

  const ok = doMove(decision.x, decision.y, decision.useStar, decision.starColor);
  if (!ok && legal.length > 0) {
    const fb = fallbackLegalDecision(legal, color, moveNo);
    doMove(fb.x, fb.y, false, color);
  }
}

function cpuTurnSimple() { cpuTurn(); }

// 内部座標 (x, y) → SGF座標文字列 "aa"〜"ii"
// 内部: x=0,y=0 = 盤面左上 (A9) = SGF aa
function toSGFCoord(x, y) {
  return String.fromCharCode(97 + x) + String.fromCharCode(97 + y);
}

function buildSGF() {
  // ── ルートノード ──
  const expireLabel = ['失効なし', '空点≤25で失効', '初回パス後失効'][expireMode] || '';
  const modeLabel   = gameMode === 'human-expert' ? '人間vsExpert'
                    : gameMode === 'human-advanced' ? '人間vsAdvanced'
                    : gameMode === 'human-classic' ? '人間vsClassic'
                    : gameMode === 'cpu-advanced-expert' ? 'CPU Advanced vs Expert'
                    : gameMode === 'cpu-expert-advanced' ? 'CPU Expert vs Advanced'
                    : gameMode === 'cpu-classic-expert' ? 'CPU Classic vs Expert'
                    : gameMode === 'cpu-expert-classic' ? 'CPU Expert vs Classic'
                    : gameMode === 'cpu-classic-advanced' ? 'CPU Classic vs Advanced'
                    : gameMode === 'cpu-advanced-classic' ? 'CPU Advanced vs Classic'
                    : 'Unknown';

  const rootComment =
    '星囲碁 / Hoshigo: Starstone Variant. ' +
    'Free-color starstone variant. ' +
    'SGF export prioritizes board reproduction. ' +
    `Mode: ${modeLabel}. StarExpire: ${expireLabel}.`;

  let sgf = `(;GM[1]FF[4]CA[UTF-8]SZ[9]KM[0]AP[Hoshigo:1.0i]C[${rootComment}]`;

  // ── 手順ノード ──
  for (const e of moveLog) {
    const playerName = e.player === BLACK ? '黒' : '白';

    if (e.type === 'pass') {
      // パス: B[] or W[] （空座標がSGF標準のパス表記）
      const token = e.player === BLACK ? 'B' : 'W';
      sgf += `;${token}[]C[${playerName} パス]`;

    } else if (e.type === 'resign') {
      // 投了はSGF標準のノードなし。コメントのみ末尾に付記
      // ルートに結果を追記したいが、既存ノードは変更済みなので
      // 最終ノードとして空パスで記録する
      const token = e.player === BLACK ? 'B' : 'W';
      sgf += `;${token}[]C[${playerName} 投了]`;

    } else {
      // 通常着手 / 星石着手
      // 盤面再現を優先: 置かれた石色でB/Wを決める
      const stoneColor = e.isStar ? e.starColor : e.player;
      const token      = stoneColor === BLACK ? 'B' : 'W';
      const coord      = toSGFCoord(e.x, e.y);

      if (e.isStar) {
        // 星石: 手番と石色のズレをコメントに記録
        const actualTurn  = playerName;
        const placedColor = e.starColor === BLACK ? '黒' : '白';
        const comment     = `星石使用: 実際の手番=${actualTurn} / 置いた石色=${placedColor}`;
        sgf += `;${token}[${coord}]C[${comment}]`;
      } else {
        // 通常手: コメントなし
        sgf += `;${token}[${coord}]`;
      }
    }
  }

  sgf += ')';
  return sgf;
}

function setSGFMsg(msg, isError) {
  const el = document.getElementById('sgf-msg');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? '#f66' : '#80c080';
}

// textarea にSGF本文を流し込み表示する
function showSGFPreview(sgf) {
  const ta = document.getElementById('sgf-preview');
  if (!ta) return;
  ta.value = sgf;
  ta.classList.add('visible');
}

// iOS Safari かどうかの判定
function isIOSSafari() {
  return /iP(hone|od|ad)/.test(navigator.userAgent) &&
         /WebKit/.test(navigator.userAgent) &&
         !/CriOS|FxiOS|OPiOS/.test(navigator.userAgent);
}

// ── 「SGFを生成」ボタン ──
// テキストエリアにSGFを表示するだけ。コピーもDLもしない。
document.getElementById('btn-sgf-gen').addEventListener('click', () => {
  if (moveLog.length === 0) {
    setSGFMsg('棋譜がありません。対局を開始してください。', true);
    return;
  }
  const sgf = buildSGF();
  showSGFPreview(sgf);
  setSGFMsg('SGFを生成しました。下のテキストを長押しで全選択→コピーできます。', false);
});

// ── 「SGFをコピー」ボタン ──
document.getElementById('btn-sgf-copy').addEventListener('click', () => {
  if (moveLog.length === 0) {
    setSGFMsg('棋譜がありません。対局を開始してください。', true);
    return;
  }
  const sgf = buildSGF();
  showSGFPreview(sgf);   // 先にtextareaに流し込む（コピー失敗時の手動コピー用）

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(sgf)
      .then(() => setSGFMsg('✅ SGFをクリップボードにコピーしました。', false))
      .catch(() => fallbackCopy(sgf));
  } else {
    fallbackCopy(sgf);
  }
});

// execCommand フォールバック（iOS含む古い環境向け）
function fallbackCopy(text) {
  // textareaが既に表示されていればそこから選択を試みる
  const preview = document.getElementById('sgf-preview');
  if (preview && preview.classList.contains('visible')) {
    try {
      preview.focus();
      preview.setSelectionRange(0, preview.value.length);
      const ok = document.execCommand('copy');
      if (ok) {
        setSGFMsg('✅ SGFをコピーしました。', false);
        return;
      }
    } catch(e) { /* fall through */ }
  }
  // 画面内に不可視textareaを作って試みる
  try {
    const ta = document.createElement('textarea');
    ta.value     = text;
    ta.readOnly  = true;
    ta.style.cssText =
      'position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;' +
      'border:none;outline:none;-webkit-user-select:text;user-select:text;';
    document.body.appendChild(ta);
    ta.focus();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      setSGFMsg('✅ SGFをコピーしました。', false);
    } else {
      setSGFMsg('コピーに失敗しました。下のSGF本文を長押しでコピーしてください。', true);
    }
  } catch(e) {
    setSGFMsg('コピーに失敗しました。下のSGF本文を長押しでコピーしてください。', true);
  }
}

// ── 「SGFをダウンロード」ボタン ──
document.getElementById('btn-sgf-dl').addEventListener('click', () => {
  if (moveLog.length === 0) {
    setSGFMsg('棋譜がありません。対局を開始してください。', true);
    return;
  }
  const sgf = buildSGF();
  showSGFPreview(sgf);   // 先にtextareaを表示（DL失敗時の手動コピー用）

  const now = new Date();
  const ts  = now.getFullYear()
    + ('0' + (now.getMonth()+1)).slice(-2)
    + ('0' + now.getDate()).slice(-2)
    + '-'
    + ('0' + now.getHours()).slice(-2)
    + ('0' + now.getMinutes()).slice(-2);
  const filename = `hoshigo_${ts}.sgf`;

  // iOS Safari は <a download> を無視するため、別アプローチを先に試みる
  if (isIOSSafari()) {
    // iOS: data: URI を新しいタブで開く（「ファイルに保存」から保存可能）
    try {
      const dataUri = 'data:application/x-go-sgf;charset=utf-8,' + encodeURIComponent(sgf);
      window.open(dataUri, '_blank');
      setSGFMsg(
        'SGFを生成しました。新しいタブが開いたら「共有」→「ファイルに保存」で保存できます。' +
        '保存できない場合は下のSGF本文を長押しでコピーしてください。',
        false
      );
    } catch(e) {
      setSGFMsg(
        '新しいタブを開けませんでした。下のSGF本文を長押しでコピーしてください。',
        true
      );
    }
    return;
  }

  // 非iOS: Blob + a.download
  try {
    const blob = new Blob([sgf], { type: 'application/x-go-sgf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // revokeObjectURL は即時呼び出しを避け、ダウンロード開始を待つ
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    setSGFMsg(
      `SGFを生成しました（${filename}）。保存できない場合は下のSGF本文をコピーしてください。`,
      false
    );
  } catch(e) {
    setSGFMsg(
      'ダウンロードに失敗しました。下のSGF本文を長押しでコピーしてください。',
      true
    );
  }
});

// ═══════════════════════════════════════════════════════════
//  棋譜ログ表示
// ═══════════════════════════════════════════════════════════

function renderLog() {
  const el = document.getElementById('move-log');
  el.innerHTML = moveLog.map(e => {
    const pName = e.player === BLACK ? '黒' : '白';
    let cls = '', text = '';

    if (e.type === 'pass') {
      cls  = 'pass-move';
      text = `${e.moveNo}. ${pName} — パス`;
    } else if (e.type === 'resign') {
      text = `${e.moveNo}. ${pName} — 投了`;
    } else {
      const coord = coordStr(e.x, e.y);
      if (e.isStar) {
        cls  = 'star-move';
        const sc = e.starColor === BLACK ? '黒★' : '白★';
        text = `${e.moveNo}. ${pName} — ${coord} [星石:${sc}]`;
      } else {
        text = `${e.moveNo}. ${pName} — ${coord}`;
      }
      if (e.captured && e.captured.length > 0)
        text += ` (取:${e.captured.length})`;
    }
    return `<div class="${cls}">${text}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function addLog(entry) {
  moveLog.push(entry);
  renderLog();
  updateStats();
}

// ═══════════════════════════════════════════════════════════
//  着手処理（人間・CPU 共用）
// ═══════════════════════════════════════════════════════════
function doMove(x, y, isStar, starColor) {
  const stoneColor = isStar ? starColor : current;
  const savedBoard = board.map(r => [...r]);
  const savedStars = new Set(starStones);

  const result = placeStone(board, x, y, stoneColor, isStar, koPoint);

  if (!result.ok) {
    board.length = 0;
    savedBoard.forEach(r => board.push(r));
    starStones.clear();
    savedStars.forEach(s => starStones.add(s));
    setStatus(`⛔ 不正手（自殺手またはコウ）。${currentPlayerLabel()}`);
    return false;
  }

  koPoint    = result.newKo || null;
  totalMoves++;
  consecutivePasses = 0;

  if (isStar) {
    starUsed[current]   = true;
    starMoveNo[current] = totalMoves;
  }

  addLog({
    moveNo: totalMoves, player: current, type: 'place',
    x, y, isStar, starColor: isStar ? starColor : null,
    captured: result.captured
  });

  current          = 1 - current;
  starPending      = false;
  pendingStarColor = null;

  drawBoard();
  updateStarPanel();
  setStatus(currentPlayerLabel());
  return true;
}

function doPass() {
  if (gameOver) return;
  totalMoves++;
  passCnt++;
  consecutivePasses++;
  firstPassDone    = true;
  starPending      = false;
  pendingStarColor = null;
  koPoint          = null;

  addLog({ moveNo: totalMoves, player: current, type: 'pass' });

  if (consecutivePasses >= 2) {
    endGame('両者パス');
    return;
  }

  current = 1 - current;
  drawBoard();
  updateStarPanel();
  setStatus(currentPlayerLabel());
}

function doResign() {
  if (gameOver) return;
  const winner = current === BLACK ? '白' : '黒';
  addLog({ moveNo: totalMoves + 1, player: current, type: 'resign' });
  endGame(`${winner} 勝ち（投了）`);
}

function endGame(reason) {
  gameOver = true;
  if (cpuTimer) { clearInterval(cpuTimer); cpuTimer = null; }
  if (cpuTimeout) { clearTimeout(cpuTimeout); cpuTimeout = null; }
  setStatus(`🏁 ゲーム終了 — ${reason}`);
  updateStarPanel();
}

// ═══════════════════════════════════════════════════════════
//  ゲーム開始 / リセット
// ═══════════════════════════════════════════════════════════
function startGame() {
  if (cpuTimer) { clearInterval(cpuTimer); cpuTimer = null; }
  if (cpuTimeout) { clearTimeout(cpuTimeout); cpuTimeout = null; }

  gameMode   = document.getElementById('sel-mode').value;
  cpuLevel   = 'expert';
  humanColor = parseInt(document.getElementById('sel-color').value);
  expireMode = parseInt(document.querySelector('input[name=expire]:checked').value);

  initBoard();
  current           = BLACK;
  koPoint           = null;
  gameOver          = false;
  starUsed          = [false, false];
  starMoveNo        = [null, null];
  starPending       = false;
  pendingStarColor  = null;
  totalMoves        = 0;
  passCnt           = 0;
  consecutivePasses = 0;
  firstPassDone     = false;
  moveLog           = [];

  hidePicker();
  drawBoard();
  updateStarPanel();
  renderLog();
  updateStats();
  setStatus(currentPlayerLabel());

  if (gameMode.startsWith('cpu-')) {
    cpuTimer = setInterval(() => {
      if (gameOver) { clearInterval(cpuTimer); cpuTimer = null; return; }
      cpuTurn();
    }, 500);
  } else if ((gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic') && humanColor === WHITE) {
    // 人間が白 → CPU(黒)から始める
    cpuTimeout = setTimeout(cpuTurn, 300);
  }
}

// ═══════════════════════════════════════════════════════════
//  Canvas イベント（クリック / タッチ）
// ═══════════════════════════════════════════════════════════
function screenToBoard(clientX, clientY) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = CANVAS_PX / rect.width;
  const scaleY = CANVAS_PX / rect.height;
  const cx = (clientX - rect.left) * scaleX;
  const cy = (clientY - rect.top)  * scaleY;
  return {
    x: Math.round((cx - MARGIN) / CELL),
    y: Math.round((cy - MARGIN) / CELL)
  };
}

function handleBoardTap(clientX, clientY) {
  const humanPlaying = gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic';
  if (!humanPlaying) return;
  if (gameOver) return;
  if (current !== humanColor) return;

  const { x, y } = screenToBoard(clientX, clientY);
  if (!inBounds(x, y)) return;

  if (starPending) {
    const ok = doMove(x, y, true, pendingStarColor);
    if (ok) cpuTimeout = setTimeout(cpuTurn, 400);
  } else {
    const ok = doMove(x, y, false, null);
    if (ok) cpuTimeout = setTimeout(cpuTurn, 400);
  }
}

canvas.addEventListener('click', e => { handleBoardTap(e.clientX, e.clientY); });

canvas.addEventListener('mousemove', e => {
  const humanPlaying = gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic';
  if (!humanPlaying || gameOver || current !== humanColor) return;
  const { x, y } = screenToBoard(e.clientX, e.clientY);
  drawBoard();
  if (inBounds(x, y) && board[y][x] === EMPTY) {
    const px = MARGIN + x * CELL;
    const py = MARGIN + y * CELL;
    ctx.beginPath();
    ctx.arc(px, py, CELL * 0.44, 0, Math.PI*2);
    ctx.fillStyle = current === BLACK ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.5)';
    ctx.fill();
  }
});
canvas.addEventListener('mouseleave', drawBoard);

// ═══════════════════════════════════════════════════════════
//  星石ボタン（人間用）
// ═══════════════════════════════════════════════════════════
function showPicker() {
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('star-picker').classList.add('visible');
}
function hidePicker() {
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('star-picker').classList.remove('visible');
}

document.getElementById('star-human').addEventListener('click', () => {
  const humanPlaying = gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic';
  if (!humanPlaying) return;
  if (gameOver || current !== humanColor) return;
  if (!canUseStarStone(humanColor)) {
    setStatus('⛔ 星石は現在使用できません（失効条件）。');
    return;
  }
  showPicker();
});

document.getElementById('star-pick-black').addEventListener('click', () => {
  hidePicker();
  starPending = true; pendingStarColor = BLACK;
  updateStarPanel();
  setStatus('★ 星石（黒）: 盤面をタップして配置してください。');
});

document.getElementById('star-pick-white').addEventListener('click', () => {
  hidePicker();
  starPending = true; pendingStarColor = WHITE;
  updateStarPanel();
  setStatus('★ 星石（白）: 盤面をタップして配置してください。');
});

document.getElementById('star-pick-cancel').addEventListener('click', () => {
  hidePicker();
  starPending = false; pendingStarColor = null;
  updateStarPanel();
});

document.getElementById('overlay').addEventListener('click', () => {
  hidePicker();
  starPending = false; pendingStarColor = null;
  updateStarPanel();
});

// ═══════════════════════════════════════════════════════════
//  主要ボタン
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-pass').addEventListener('click', () => {
  const humanPlaying = gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic';
  if (!humanPlaying || gameOver || current !== humanColor) return;
  doPass();
  if (!gameOver) cpuTimeout = setTimeout(cpuTurn, 400);
});

document.getElementById('btn-resign').addEventListener('click', () => {
  const humanPlaying = gameMode === 'human-expert' || gameMode === 'human-advanced' || gameMode === 'human-classic';
  if (!humanPlaying || gameOver || current !== humanColor) return;
  doResign();
});

document.getElementById('btn-reset').addEventListener('click', startGame);
document.getElementById('btn-start').addEventListener('click', startGame);

// ── モード変更時の UI 更新 ──
document.getElementById('sel-mode').addEventListener('change', updateModeUI);

// ═══════════════════════════════════════════════════════════
//  詳細セクション 開閉
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-detail-toggle').addEventListener('click', () => {
  const content = document.getElementById('detail-content');
  const arrow   = document.getElementById('detail-arrow');
  const isOpen  = content.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
});

// ═══════════════════════════════════════════════════════════
//  初期化
// ═══════════════════════════════════════════════════════════
updateModeUI();
startGame();

} catch(initErr) {
  showFatalError(initErr.message || String(initErr));
}
}); // DOMContentLoaded
